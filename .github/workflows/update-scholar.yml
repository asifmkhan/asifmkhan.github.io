name: Update Scholar metrics

# Refreshes scholar_data.json from Google Scholar and commits any change.
# Runs weekly (Mondays 06:00 UTC) and on-demand from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install scholarly

      - name: Refresh metrics
        run: python3 scripts/update_scholar.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain scholar_data.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add scholar_data.json
            git commit -m "chore: refresh Scholar metrics [skip ci]"
            git push
          else
            echo "No change to scholar_data.json."
          fi
